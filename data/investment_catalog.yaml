# Playable investment catalog — edit this file, then run: npm run sync:investments
# (also runs from prebuild / predev). See GAME_RULES.md and docs/investment_cards.yaml for design notes.
version: 1
kind: investment_catalog_v1
intro:
  title: Investment catalog (playable)
  body: >-
    Three tiers, post-$15-starting-cash rebalance:
    cheap ($2–3, small advantage — usually one-shot or once-per-round +1),
    medium ($5–7, meaningful upgrade — stronger or stacked discounts),
    expensive ($10–12, big effect — drives mid/late game compounding).
    Each card has a stable id (used in saves), printed capital, optional modifiers
    (engine-backed kinds only — see sync script), and deckCopies (use 1 for unique cards).

cards:
  # ───────── Cheap tier ($2–3) — small, easy to afford early ─────────
  - id: inv_grain_elevator
    name: Grain elevator
    rarity: Standard
    capital: 2
    short: Cheap market bump
    effect: >-
      While active, once per round your market buy draws one extra resource card on that action.
    deckCopies: 3
    modifiers:
      - kind: market_buy_bonus_cards
        extra: 1
        oncePerRound: true

  - id: inv_family_recipe
    name: Family recipe
    rarity: Standard
    capital: 2
    short: One cheaper action
    effect: >-
      While active, your very next distillery action this round costs $1 less (cost stays at a
      minimum of $0). Light flexibility pick — turn the next paid action back into a free one.
    deckCopies: 3
    modifiers:
      - kind: action_cost_discount
        amount: 1
        scope: next_action

  - id: inv_tourism_board
    name: Tourism board seat
    rarity: Standard
    capital: 3
    short: First paid action cheaper
    effect: >-
      While active, the first paid action you take each round costs $1 less.
    deckCopies: 3
    modifiers:
      - kind: action_cost_discount
        amount: 1
        scope: per_round_first_paid

  - id: inv_rickhouse
    name: Rickhouse expansion
    rarity: Standard
    capital: 3
    short: Lighter rent each round
    effect: >-
      While active, once per round subtract $1 from your total rickhouse fees (minimum $0).
    deckCopies: 3
    modifiers:
      - kind: rickhouse_fee_discount
        amount: 1
        oncePerRound: true

  - id: inv_second_shift
    name: Second shift
    rarity: Standard
    capital: 3
    short: One cheaper action (Standard)
    effect: >-
      While active, your very next distillery action this round costs $1 less (stacks with free
      window — $0 stays $0). A Standard-priced alternative to Family recipe so the effect
      shows up more often.
    deckCopies: 2
    modifiers:
      - kind: action_cost_discount
        amount: 1
        scope: next_action

  # ───────── Medium tier ($5–7) — meaningful, mid-game pivot ─────────
  - id: inv_climate
    name: Climate-controlled tier
    rarity: Standard
    capital: 5
    short: Steady aging, steadier books
    effect: >-
      While active, the first paid action you take each round costs $1 less AND once per round
      subtract $1 from your total rickhouse fees (minimum $0). A balanced mid-tier upgrade.
    deckCopies: 2
    modifiers:
      - kind: action_cost_discount
        amount: 1
        scope: per_round_first_paid
      - kind: rickhouse_fee_discount
        amount: 1
        oncePerRound: true

  - id: inv_corn_futures
    name: Corn futures
    rarity: Standard
    capital: 5
    short: Two extra market draws
    effect: >-
      While active, once per round your market buy draws TWO extra resource cards on that action.
      Aggressive market accelerator.
    deckCopies: 2
    modifiers:
      - kind: market_buy_bonus_cards
        extra: 2
        oncePerRound: true

  - id: inv_mash_reclamation
    name: Mash reclamation
    rarity: Standard
    capital: 6
    short: Two dollars off, every year
    effect: >-
      While active, once per round subtract $2 from your total rickhouse fees (minimum $0).
      Efficient reuse programme that really adds up in a crowded rickhouse.
    deckCopies: 2
    modifiers:
      - kind: rickhouse_fee_discount
        amount: 2
        oncePerRound: true

  - id: inv_brand
    name: Brand ambassador
    rarity: Rare
    capital: 7
    short: Two off the first paid action
    effect: >-
      While active, the first paid action you take each round costs $2 less (cost stays at a
      minimum of $0). Repeats forever once installed — a rare flagship cost shaver.
    deckCopies: 2
    modifiers:
      - kind: action_cost_discount
        amount: 2
        scope: per_round_first_paid

  # ───────── Expensive tier ($10–12) — big, compounding endgame ─────
  - id: inv_estate_distillery
    name: Estate distillery
    rarity: Rare
    capital: 10
    short: Heritage compound effects
    effect: >-
      While active, once per round subtract $2 from rickhouse fees AND draw one extra resource
      card on your market buy. High capital cost but compounds into serious advantage.
    deckCopies: 1
    modifiers:
      - kind: rickhouse_fee_discount
        amount: 2
        oncePerRound: true
      - kind: market_buy_bonus_cards
        extra: 1
        oncePerRound: true

  - id: inv_warehouse_syndicate
    name: Warehouse syndicate
    rarity: Rare
    capital: 11
    short: Deep rent relief
    effect: >-
      While active, once per round subtract $3 from your total rickhouse fees (minimum $0).
      Expensive but shreds rent in a packed cap-6 warehouse without true monopoly.
    deckCopies: 1
    modifiers:
      - kind: rickhouse_fee_discount
        amount: 3
        oncePerRound: true

  - id: inv_master_cooper
    name: Master cooper
    rarity: Rare
    capital: 12
    short: Cheap actions + lighter rent
    effect: >-
      While active, the first paid action you take each round costs $2 less, and once per round
      subtract $2 from your total rickhouse fees (minimum $0). The flagship endgame upgrade —
      cheaper to act and cheaper to age.
    deckCopies: 1
    modifiers:
      - kind: action_cost_discount
        amount: 2
        scope: per_round_first_paid
      - kind: rickhouse_fee_discount
        amount: 2
        oncePerRound: true
