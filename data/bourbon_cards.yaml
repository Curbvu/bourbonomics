# Canonical bourbon card data for Bourbonomics (single source of truth).
# After editing, run: npm run sync:cards  (also runs on prebuild / predev).
version: 1
kind: bourbon_cards_v1
intro:
  title: Bourbon cards
  body: >-
    Named **Bourbon Market Price Guide** cards for *Bourbonomics*. Each card is a
    specific product line. The guide is a **3×3** table: **age bands** down the
    side (**2–3**, **4–7**, **8+** years) and **demand bands** across the top
    (**Low 2–3**, **Mid 4–5**, **High 6+** market-demand barrels). Your sale price
    is the dollar amount in the cell where **your age band** meets **your demand
    band** — no “highest row/column ≤” math. **Standard** cards are common;
    **Rare** cards are fewer copies with higher ceilings.


    **Mash arithmetic (read this before awards):** Count only **Corn**, **Rye**,
    **Wheat**, and **Barley** cards (not **Cask** / **Flavor**). A legal bourbon
    mash uses **at most three grain cards total**, must include **≥1 Corn**, and
    must include **≥1** of **Rye / Wheat / Barley** (see **GAME_RULES**). So you
    cannot have **four** grain cards or **four** distinct grain types in one mash;
    the richest legal bills are **tri-type** (e.g. corn + rye + wheat) or
    **double-down** on one small grain (e.g. **2 rye + 1 corn**). **Per-type caps**
    in practice: e.g. **≥3 corn** alone would skip the required small grain—awards
    never ask for that; **≥4** of any grain type is impossible.


    **Silver / Gold awards** read like real distillery and competition copy: they
    care about **grain bills** under those limits—plus **age band on this card’s
    grid** and sometimes **provenance** (**rickhouse-0** … **rickhouse-5**).
    **Silver** is the strong bar (corn-forward, rye-heavy, wheat- or barley-led,
    tri-type, or a named rick). **Gold** is exceptional: **tri-type** mashes,
    **2 + 1** stacks (two of one grain + corn + the third slot), **8+** age band on
    this card, or warehouse story that matches the line.


    Awards appear on **Rare** cards and a small set of **flagship Standard** lines;
    cards without award lines still sell using the Market Price Guide only.


    **Rickhouse ↔ Kentucky Bourbon Trail® regions (in-game ids):** **rickhouse-0**
    **Northern Region**, **rickhouse-1** **Louisville Region**, **rickhouse-2**
    **Central Region**, **rickhouse-3** **Lexington Region**, **rickhouse-4**
    **Bardstown Region**, **rickhouse-5** **Western Region**—use these names when a
    card calls out a warehouse story or provenance.


    Selling rules and **demand 0** are in **GAME_RULES.md** (demand **0** pays
    **age in dollars**, not a grid cell).
