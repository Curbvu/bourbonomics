# Market cards
#
# Phase 3 deck. Each baron draws 2, keeps 1, discards 1. Most cards raise
# demand; a handful are softer twists (small drops, conditional bumps,
# resource shortages that lock a pile for the next round).
#
# resolved.kind:
#   demand_delta             — adjust market demand by `delta` immediately
#                              when the card is kept (positive raises,
#                              negative lowers; clamped to 0..12).
#   demand_delta_conditional — apply `deltaAbove` if current demand is > threshold,
#                              else apply `deltaBelow`. For "+1 if hot, +2 if cool"
#                              style cards.
#   resource_shortage        — lock a resource pile for the *next* round; queued
#                              into pendingRoundEffects, then activated at the
#                              next startNextRound. `resource` ∈ cask | corn |
#                              barley | rye | wheat.
#   flavor                   — engine-side no-op; prose still renders to the UI.

cards:
  # ─── Demand raisers (the bulk of the deck) ─────────────────────────────────
  - id: holiday_rush
    title: "Holiday rush"
    effect: "Demand surges as the holidays approach. Demand **+2**."
    deckCopies: 4
    resolved:
      kind: demand_delta
      delta: 2

  - id: critic_review
    title: "Critic's review"
    effect: "A glowing review hits the trade press. Demand **+2**."
    deckCopies: 3
    resolved:
      kind: demand_delta
      delta: 2

  - id: cocktail_revival
    title: "Cocktail revival"
    effect: "Old fashioneds are everywhere again. Demand **+1**."
    deckCopies: 4
    resolved:
      kind: demand_delta
      delta: 1

  - id: export_deal
    title: "Export deal"
    effect: "A foreign distributor signs on. Demand **+3**."
    deckCopies: 2
    resolved:
      kind: demand_delta
      delta: 3

  - id: bourbon_festival
    title: "Bourbon festival"
    effect: "The annual festival drives buyers to the state. Demand **+1**."
    deckCopies: 3
    resolved:
      kind: demand_delta
      delta: 1

  - id: celebrity_endorsement
    title: "Celebrity endorsement"
    effect: "A famous face is suddenly drinking your brand. Demand **+2**."
    deckCopies: 2
    resolved:
      kind: demand_delta
      delta: 2

  - id: distillers_award
    title: "Distillers' award"
    effect: "An industry award lifts the whole category. Demand **+1**."
    deckCopies: 3
    resolved:
      kind: demand_delta
      delta: 1

  - id: trade_show_buzz
    title: "Trade show buzz"
    effect: "Buyers chatter at a national trade show. Demand **+1**."
    deckCopies: 2
    resolved:
      kind: demand_delta
      delta: 1

  # ─── Conditional demand swings ─────────────────────────────────────────────
  - id: smart_marketing
    title: "Smart marketing"
    effect: "If demand is **above 6**, demand **+1**; otherwise **+2**."
    deckCopies: 2
    resolved:
      kind: demand_delta_conditional
      threshold: 6
      deltaAbove: 1
      deltaBelow: 2

  - id: contrarian_press
    title: "Contrarian press"
    effect: "If demand is **above 6**, demand **−1**; otherwise **+2**."
    deckCopies: 1
    resolved:
      kind: demand_delta_conditional
      threshold: 6
      deltaAbove: -1
      deltaBelow: 2

  - id: scarcity_premium
    title: "Scarcity premium"
    effect: "If demand is already **above 8**, demand **+2**; otherwise **+1**."
    deckCopies: 1
    resolved:
      kind: demand_delta_conditional
      threshold: 8
      deltaAbove: 2
      deltaBelow: 1

  # ─── Demand drops (rarer) ──────────────────────────────────────────────────
  - id: economic_downturn
    title: "Economic downturn"
    effect: "Tightened wallets across the country. Demand **−2**."
    deckCopies: 2
    resolved:
      kind: demand_delta
      delta: -2

  - id: wine_takes_over
    title: "Wine takes over"
    effect: "A wine boom pulls drinkers away from brown spirits. Demand **−1**."
    deckCopies: 2
    resolved:
      kind: demand_delta
      delta: -1

  # ─── Resource shortages (lock a pile next round) ───────────────────────────
  - id: corn_blight
    title: "Corn harvest fail"
    effect: "A bad season locks the **corn** pile next round."
    deckCopies: 2
    resolved:
      kind: resource_shortage
      resource: corn

  - id: cooperage_strike
    title: "Cooperage strike"
    effect: "Coopers strike — **cask** pile is locked next round."
    deckCopies: 1
    resolved:
      kind: resource_shortage
      resource: cask

  - id: rye_blight
    title: "Rye blight"
    effect: "Disease in the rye fields — **rye** pile locked next round."
    deckCopies: 1
    resolved:
      kind: resource_shortage
      resource: rye

  - id: wheat_storm
    title: "Hailstorm"
    effect: "Hail flattens the wheat — **wheat** pile locked next round."
    deckCopies: 1
    resolved:
      kind: resource_shortage
      resource: wheat

  - id: barley_drought
    title: "Barley drought"
    effect: "Drought withers the barley — **barley** pile locked next round."
    deckCopies: 1
    resolved:
      kind: resource_shortage
      resource: barley

  # ─── Pure flavor (engine-side no-op) ───────────────────────────────────────
  - id: rickhouse_inspection
    title: "Rickhouse inspection"
    effect: "Inspectors comb the warehouses. (Flavor — full effect arrives in a future engine pass.)"
    deckCopies: 1
    resolved:
      kind: flavor
