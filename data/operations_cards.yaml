version: 1
kind: operations_deck_v1
title: Operations cards
companion_doc: GAME_RULES.md
preamble:
  how_actions: >-
    Per **GAME_RULES → Actions**, **Draw operations cards** is **one action** among everything else you might do on your
    turn. You do **not** pay a separate "card price" printed on the operations card for that—**the action itself** has
    the cost.


    Actions on a turn use **one escalating sequence**: **1st action free ($0)**, **2nd costs $1**, **3rd costs $2**,
    **4th costs $3**, and so on (see the table in **GAME_RULES**). Whichever **step** you are on when you take your
    **draw/play operations card** action is what you pay to the bank for **that** action.


    So the **only** "prerequisite" is: **you must spend an action** (and therefore accept **that** step's cost on the
    track). The **outcomes below are tuned** so that—**after** accounting for the fact that this uses an action—the
    **benefit** of the card is **worth it on average** when you model the deck as a whole.
  notation:
    B: number of **Barons** (players) in the game
balance:
  intro: When you balance the **operations** deck, model each card's **cash equivalent** for a **typical** line of play
    (value **extra** resources at **~$1** each when comparing cards to each other; value **−$1** to fees as **~$1**
    saved).
  targets:
    - label: Mean ≈ $4
      detail: Across the deck, the **expected** cash-equivalent value of resolving a random operations card should land near
        **$4** (so taking the action is "worth it" on average vs. a neutral blank).
    - label: Median ≈ $3
      detail: "**Half** the cards should be **≤ ~$3** equivalent on a **normal** resolution—lots of steady, modest hits."
    - label: Right tail
      detail: A **minority** of resolutions should spike **well above** the median (**~$7–$12+** equivalent) when the board
        lines up, so the distribution is **right-skewed** (mean > median).
  practical_recipe: "**Practical recipe:** most cards with **steady** **$2–$4** outcomes; several with **conditional**
    spikes; a few **high-variance** cards where upside is rare but large (demand high, many rickhouses, perfect roll,
    etc.). The numbers in the tables below follow that shape."
notes_v8: >-
  v8 prune (2026): cards that depended on removed mechanics (demand dice, debt markers,
  cross-turn cost modifiers, undo, in-hand "hold for later" effects) were dropped. Every
  remaining card either has an engine resolver in `lib/modifiers/operations.ts` or
  describes a conceptually clean effect that maps cleanly to existing actions.
categories:
  - id: cash_liquidity
    title: Cash & liquidity
    cards:
      - id: county_rebate
        title: County rebate
        concept: Economic development grant.
        effect: Gain **$6** if market demand is **≥ 6**; otherwise gain **$2**. *(Rough EV ≈ $4 if high-demand happens ~half the
          time—tune with your demand model.)*
      - id: fire_sale
        title: Fire sale
        concept: Move inventory fast.
        effect: Discard **1 resource**; gain **$6**. *(Treat net as **~$5** if a spare resource is worth ~$1.)*
      - id: angels_share_cash
        title: Angels' share (cash)
        concept: Evaporation in your favor.
        effect: Gain **$2** per **year token** on your **oldest** barrelled bourbon (**max $10**). *(Typical **1–2** tokens →
          median-friendly; cap stops runaway tail on this card—tail lives elsewhere.)*
      - id: tour_bus_tips
        title: Tour bus tips
        concept: Visitors love the gift shop.
        effect: Gain **$3** **+$1** per **distinct rickhouse** where you have at least one barrel (**max $3 + 6**). *(Median
          case **~$4–$5** with **1–2** houses; **right tail** when you span many regions.)*
  - id: rickhouse_fees
    title: Rickhouse & fees
    cards:
      - id: stack_swap
        title: Stack swap
        concept: Crew rotates barrels for you.
        effect: "Add **+1 year token** to one of your barrelled bourbons (no fee paid)."
  - id: market_hand
    title: Market & hand (resources)
    cards:
      - id: cooper_on_call
        title: Cooper on call
        concept: Emergency repair staves.
        effect: Swap a cask in one of your rickhouses for a cask in your hand.
      - id: mulligan_mash
        title: Mulligan mash
        concept: Scrap the cook.
        effect: "**Discard up to 2** resources; **draw 4** from any combination of piles. **Gain $3** from scrap credit."
      - id: grain_sweep
        title: Grain sweep
        concept: Clean the bin.
        effect: Take **2** cards from the **Grain** pile; **gain $2**. *(Roughly **~$4** equivalent if a card ≈ **$1**.)*
      - id: corn_rush
        title: Corn rush
        concept: Harvest window.
        effect: Take **2** cards from the **Corn** pile; **gain $2**. *(Same as above.)*
  - id: bourbon_sale_moment
    title: Bourbon sale moment
    cards:
      - id: sample_pour
        title: Sample pour
        concept: Small loss, good will.
        effect: "**Gain $3** now. On your **next** sale this turn, take **−$1** revenue **but** **market demand** does **not**
          drop for that sale. *(Net swing depends on sale size—often **~$3** floor.)*"
      - id: flash_tasting
        title: Flash tasting
        concept: Hype before the deal.
        effect: "**Gain $2** now. On your **next sale this turn**, treat demand as **+1** for **price lookup only**."
      - id: broker_call
        title: Broker call
        concept: Better quote.
        effect: On your **next sale this turn**, after you see Bourbon Card options, you may **discard 1** resource to **draw
          1** replacement Bourbon Card from the deck. **Gain $2** when you sell (even if you don't replace).
      - id: sticker_shock
        title: Sticker shock
        concept: Customer pays more anyway.
        effect: On your **next sale this turn**, **+$4** revenue; **market demand** still drops normally. *(Tail when your sale
          price was already high.)*
  - id: soft_interaction
    title: Soft interaction (table politics)
    cards:
      - id: county_fair_booth
        title: County fair booth
        concept: Everyone sells a little.
        effect: Each player gains **$1**; you **gain $3** more (**$4** total to you).
  - id: cleanup_recovery
    title: Cleanup / recovery
    cards:
      - id: smoke_break
        title: Smoke break
        concept: Pause the line.
        effect: "**End your action phase now**; **gain $3** if you already took **3+** actions this turn, otherwise **gain
          $1**."
  - id: new_arrivals
    title: New arrivals
    cards:
      - id: distillers_bonus
        title: Distiller's bonus
        concept: End-of-year payout.
        effect: "**Gain $1 per barrelled bourbon** you own (max $8). *(Steady-scaling payout — rewards mid-game volume.)*"
      - id: speakeasy_tipoff
        title: Speakeasy tipoff
        concept: Back-alley intel.
        effect: "**Gain $4** if **market demand ≥ 4**, otherwise **gain $1**. Low-variance fallback card."
      - id: copper_salvage
        title: Copper salvage
        concept: Pull a barrel out and recoup scrap.
        effect: "**Gain $2 per year token** on your *youngest* barrelled bourbon (max **$6**). *(Rewards freshly-laid stock.)*"
      - id: blenders_touch
        title: Blender's touch
        concept: Master blender moment.
        effect: "**Gain $3** immediately. If you own any barrel whose mash includes **≥3 grain types**, **gain $5** instead."
      - id: late_shipment
        title: Late shipment
        concept: A pallet of resources turns up at the gate.
        effect: "**Draw 2 resource cards** from a single pile of your choice (face-down). Free — does not cost an additional action."
      - id: coopers_gift
        title: Cooper's gift
        concept: Spare cask from the cooperage.
        effect: "**Gain $2**. If you have **fewer than 2 barrels** barrelled, **gain $4** instead. A mercy payout for slow starts."
      - id: state_fair_demo
        title: State fair demo
        concept: Public tasting pays the gate.
        effect: "**Gain $6** if market demand is **odd**, otherwise **gain $3**. Demand-parity flex."
      - id: insurance_payout
        title: Insurance payout
        concept: Claim settled.
        effect: "**Gain $2 per rickhouse** where you have **no barrels** (max **$6**). *(Awkward-comeback tool — pays more when you're thin.)*"
footer: "**Design note:** Operations should **not** duplicate **investment** payoffs (no permanent \"−$1 all rickhouse
  fees forever\"). If an effect feels evergreen, move it to **[investment_cards.yaml](investment_cards.yaml)** with
  **capital** and **upright** rules."
