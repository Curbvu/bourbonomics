version: 1
kind: investment_deck_v1
title: Investment cards
companion_doc: GAME_RULES.md
intro: >-
  Companion to **[GAME_RULES.md](GAME_RULES.md)**. Core rules for investment cards live there under **Investment
  cards**.


  **Runtime / playable cards** are authored in **[investment_catalog.yaml](investment_catalog.yaml)** (YAML → bundled JSON → app).


  These rows are **not balanced**—they are prompts for future cards. When you print a card, give it a clear **capital**
  cost, **timing** (when it triggers), and **upright** effect.


  **Suggested capital** is a **design starting point**: mix **fixed dollars**, **B** (Barons / players), **R**
  (rickhouses where **you** have at least one barrel), **B_all** (barrels you have **in play**), and **D** (current
  **market demand**) so costs **scale** with table state. Round **up** at the table unless you say otherwise.


  ---
categories:
  - id: rickhouse_storage
    title: Rickhouse & storage
    cards:
      - id: rickhouse_expansion
        title: Rickhouse expansion
        capital: "**$6 × R** (min **$6**)"
        concept: Buy or lease extra rack slots in one rickhouse you already use.
        effect: Add **+1 barrel slot** in a named region; only you may place into that slot until sold.
      - id: climate_controlled_tier
        title: Climate-controlled tier
        capital: "**$4 + $2 × B**"
        concept: Premium floor space with steadier aging.
        effect: Barrels in that slot **ignore one year** of negative rent events (if you add those) or age **+1 extra token**
          every *N* turns.
      - id: co_op_warehousing
        title: Co-op warehousing
        capital: "**$3 ×** (number of **other** players with barrels in **that** rickhouse)"
        concept: Share costs with the table.
        effect: "**Split** rickhouse fee for that house with one other willing player (they must agree once per turn); you still
          age your barrels."
      - id: bonded_annex
        title: Bonded annex
        capital: "**$15** in Normal · **$9** in Bottled-in-Bond"
        concept: Regulatory flair; ties to Bottled-in-Bond mode.
        effect: In BiB mode, **−$1** off rickhouse fees in one named rickhouse.
      - id: springhouse_rights
        title: Springhouse rights
        capital: "**$2 ×** (capacity of chosen rickhouse: 3–6)"
        concept: Water source for proofing and steam.
        effect: "**−$1** off **entry rent** the first time you **make bourbon** into a chosen rickhouse each turn."
      - id: angels_share_rebate
        title: Angels’ share rebate
        capital: "**⌈D⌉ + $2** (pay when you implement; D at acquisition)"
        concept: Accounting fiction that still saves cash.
        effect: Once per turn, when you pay rickhouse fees, **round down** the total you pay by **$1** (minimum $0).
      - id: rickhouse_naming_rights
        title: Rickhouse naming rights
        capital: "**$5 × B**"
        concept: Vanity slot; tourists pay you.
        effect: "Pick one rickhouse where you have at least one barrel: once per turn, gain **$1** when **another** player
          places or sells a barrel there."
      - id: rack_repositioning
        title: Rack repositioning
        capital: "**$12 + B_all** (your barrel count)"
        concept: One-time barrel shuffle.
        effect: "**Once per game**, move **one** of your barrelled bourbons to a **different slot** in the **same** rickhouse
          (still cannot move between rickhouses)."
      - id: private_rickhouse_key
        title: Private rickhouse key
        capital: "**$8 + $2 ×** (players with any barrel in that region)"
        concept: Exclusive access window.
        effect: "**Once per turn**, you may **make bourbon** into a **full** rickhouse if you would be the **sole** occupant
          after placing (otherwise illegal—tune if you never allow overfill)."
  - id: actions_cashflow
    title: Actions & cashflow
    cards:
      - id: second_shift
        title: Second shift
        capital: "**$7 + B**"
        concept: Your crew works longer; actions cost less in the middle of your turn.
        effect: Once per turn, **discount $1** off the price of your **4th** action (i.e. the one that would cost $3).
      - id: line_of_credit
        title: Line of credit
        capital: "**$5 × B**"
        concept: Bank backs your ops.
        effect: Once per turn, you may **defer $X** of an action’s cash cost until **end of turn**; pay then or take a small
          penalty.
      - id: automation
        title: Automation
        capital: "**$10 + R**"
        concept: Bottling line efficiency.
        effect: The **first** “buy from market” action each turn still advances the action track but you **draw +1** resource (4
          instead of 3) once per turn.
      - id: union_scale
        title: Union scale
        capital: "**$6 × ⌈B / 2⌉**"
        concept: Predictable labor costs.
        effect: Your **5th** action each turn costs **$1 less** than normal (the step that would be $4 becomes $3—tune if you
          cap actions).
      - id: early_close
        title: Early close
        capital: "**$4 + 2 ×** (# regions where you sold bourbon **last** round, max 6)"
        concept: Send the crew home; save on overtime.
        effect: Once per turn, you may **end your action phase early** after at least **one** action; gain **$1** if you skipped
          2+ actions you could have afforded.
      - id: cfo_retainer
        title: CFO retainer
        capital: "**$3 × B + $5**"
        concept: Someone counts the pennies.
        effect: Once per turn, when paying **any** fee to the bank, you may pay **$1 less** if you also **discard 1 resource**
          from hand.
      - id: intern_cohort
        title: Intern cohort
        capital: "**$2 × B + $4**"
        concept: Cheap labor, light oversight.
        effect: The **first** “draw operations card” action each turn costs **$1 less** on the action track (minimum **$0** for
          that action’s price).
      - id: liquidity_window
        title: Liquidity window
        capital: "**$8 + D** (D at time of capitalizing)"
        concept: Bridge cash between actions.
        effect: Once per turn, you may **take $3** from the bank and **owe $4** at **end of turn**—if you cannot pay, discard
          **this card** and pay what you can (tune bankruptcy interaction).
  - id: market_resources
    title: Market & resources
    cards:
      - id: corn_futures
        title: Corn futures
        capital: "**$5 + $2 ×** (other players who bought corn **this round**)"
        concept: Lock in corn supply.
        effect: Once per turn, when you buy from the market, you may take one additional corn (i.e. draw 4 resources total).
      - id: grain_futures
        title: Grain futures
        capital: "**$5 + $2 ×** (other players who bought grain **this round**)"
        concept: Lock in grain supply.
        effect: Once per turn, when you buy from the market, you may take one additional grain (i.e. draw 4 resources total).
      - id: cooperage_contract
        title: Cooperage contract
        capital: "**$6 + R**"
        concept: Reliable barrels.
        effect: Once per turn, when you buy from the market, you may take one additional Cask (i.e. draw 4 resources total).
      - id: silo_lease
        title: Silo lease
        capital: "**$4 × B**"
        concept: Stash feedstock off the board.
        effect: "**Bank** up to **2** resource cards **face-down** here; **once per turn**, when you **make bourbon**, you may
          spend from the silo as if they were in hand."
      - id: vertical_integration
        title: Vertical integration
        capital: "**$7 + 2 × R**"
        concept: Own a piece of the supply chain.
        effect: When you **make bourbon**, gain **+$1** from the bank (once per turn).
      - id: seasonal_contract
        title: Seasonal contract
        capital: "**$15** once"
        concept: Harvest window.
        effect: "**Once per game**, on a market buy, draw **+2** extra resources, then **discard 2** you drew this action (keep
          net +1 if you prefer a smaller swing)."
      - id: speculator_s_desk
        title: Speculator’s desk
        capital: "**⌈12 − D⌉ + $5** (high when demand is low)"
        concept: Bet on the next flip.
        effect: At start of your turn, **name** Cask, Corn, or Grain; if your **next** market buy includes **at least one** card
          from that pile, **+$2** when you finish that sale or **+$1** when you **make bourbon** later this turn (pick
          one when balancing).
      - id: blending_stock_reserve
        title: Blending stock reserve
        capital: "**$3 × B**"
        concept: Hold odd lots for later.
        effect: "**Bank** **1** resource **face-up** here; **once per turn**, you may swap it with a card you just drew on a
          market buy (before discarding)."
      - id: local_co_op
        title: Local co-op
        capital: "**$2 × B + $6**"
        concept: Neighbors share trucks.
        effect: Once per turn, when **another** player buys from the market, you may **copy** **one** of their three draws (same
          pile) by paying them **$1** (they choose if ties).
  - id: mash_quality
    title: Mash & quality
    cards:
      - id: grain_elevator
        title: Grain elevator
        capital: "**$5 + ⌈D / 3⌉**"
        concept: Bulk grain bargaining.
        effect: "**−$1** off the **next** market-buy action’s *action fee* only (you still pay the escalating action track—apply
          discount to the listed dollar cost)."
      - id: exclusive_mash_bill
        title: Exclusive mash bill
        capital: "**$8 + $3 ×** (# distinct grain types—barley / rye / wheat—in your “signature” mash, 1–3)"
        concept: Trademarked recipe feel.
        effect: Choose **one** grain type (Barley / Rye / Wheat). When you **sell** bourbon whose mash includes that grain,
          **+$1** revenue once per sale.
      - id: heavy_char
        title: Heavy char
        capital: "**$6 ×** (# **special** casks you control in hand or silo, max 3)"
        concept: Deep toast on the barrel.
        effect: Your **first** “make bourbon” each turn treats **one** Cask in the mash as having **+1** effective “quality” for
          **award** checks (if you track quality tiers).
      - id: small_batch_license
        title: Small batch license
        capital: "**$10 + B**"
        concept: Lean into fewer, richer mashes.
        effect: If your mash uses **4** corn+grain cards, draw **+1** Bourbon Card when you **sell** (keep the usual choose-one
          rules).
      - id: proofing_lab
        title: Proofing lab
        capital: "**$4 × ⌈B / 2⌉ + $6**"
        concept: Numbers matter at the TTB window.
        effect: "**Once per turn**, when you sell, you may treat your barrel’s **age** as **+1** for Market Price Guide lookup
          only (not for awards)."
      - id: heads_hearts_cut
        title: Heads & hearts cut
        capital: "**$9 + R**"
        concept: Cleaner distillate story.
        effect: When you **sell**, if your mash includes **both** barley **and** (rye or wheat), **+$1** revenue (once per
          sale).
  - id: sales_demand
    title: Sales & demand
    cards:
      - id: brand_ambassador
        title: Brand ambassador
        capital: "**$5 × B**"
        concept: Soften demand swings.
        effect: Once per turn, when **you** sell bourbon, **market demand** drops by **0** instead of **1** (other players’
          sales still reduce demand normally).
      - id: export_license
        title: Export license
        capital: "**D + $3 × R** (D at capitalization)"
        concept: Sell into another “market.”
        effect: Once per turn, treat **market demand** as **+1** for **one** of your sales only (for price lookup).
      - id: tasting_room
        title: Tasting room
        capital: "**$8 + 2 ×** (players with **≥ 1** Gold track / award slot—tune)"
        concept: Direct-to-consumer.
        effect: When you choose the **face-up** Bourbon Card for a sale, **+$2** if demand is **≥ 6**.
      - id: marketing_team
        title: Marketing Team
        capital: "**$4 × B + $6**"
        concept: Your marketing team runs a campaign to boost your brand.
        effect: Pay **$#** (# = barons still in the game) and you may **roll the market demand dice** as **one** of your
          actions. If **$#** is greater than that action’s cost, pay **$0** for the action; if less, pay only the
          **difference**.
      - id: wholesale_partner
        title: Wholesale partner
        capital: "**$3 × B_all + $5**"
        concept: Volume over margin.
        effect: When you **sell** bourbon, you may take **−$2** revenue to **not** reduce market demand by **1** for that sale
          (still reduces normally for other players’ sales).
      - id: duty_paid_slot
        title: Duty-paid slot
        capital: "**$7 + ⌈D / 2⌉**"
        concept: Pre-cleared shelf space.
        effect: "**Once per turn**, your **first** sale may ignore **odd/even** quirks on the Bourbon Card if you use odd-demand
          cards (tune to your “even demand” note in **GAME_RULES**)."
      - id: seasonal_release
        title: Seasonal release
        capital: "**$12** when D ≥ 8 · **$18** when D ≤ 4 (pick one window when you capitalize)"
        concept: Hype drop.
        effect: If market demand is **≥ 8**, your sales **+$2** once per turn; if demand is **≤ 3**, **−$1** once per turn
          (risk/reward knob).
  - id: interaction_trading
    title: Interaction & trading
    cards:
      - id: broker_s_license
        title: Broker’s license
        capital: "**$6 + B**"
        concept: Facilitate deals.
        effect: Once per turn, when you **trade**, you may **also** swap **one** face-up Bourbon Card with the top of the
          Bourbon deck (both sides see the swap).
      - id: non_compete
        title: Non-compete
        capital: "**$5 ×** (opponents who bought from chosen pile **last** turn)"
        concept: Lock a rival out of a pile.
        effect: Pick a market pile (**Cask / Corn / Grain**). Until your next turn, **one** chosen opponent must pay you **$1**
          extra to buy from that pile (they can refuse and buy elsewhere).
      - id: white_label_deal
        title: White-label deal
        capital: "**$4 × B + $8**"
        concept: Bottle for someone else’s label.
        effect: Once per turn, when another player **sells** bourbon, you may **give them $1** to let you **peek** at the top of
          the Bourbon deck; they keep the sale.
      - id: barrel_futures
        title: Barrel futures
        capital: "**$10 + B**"
        concept: Promise tomorrow’s output.
        effect: "**Once per game**, **sell** a face-down **promise** token for **$5**; on your next turn you must **make
          bourbon** or pay **$3** to the buyer (tune amounts)."
      - id: distribution_slot
        title: Distribution slot
        capital: "**$3 ×** (other barons you’ve **traded** with since your last turn, max **B−1**)"
        concept: Shelf space at the general store.
        effect: Trades involving **Bourbon Cards** may include **+$1** to you if you are not the active player (once per round
          of negotiation).
  - id: awards_information
    title: Awards & information
    cards:
      - id: heritage_label
        title: Heritage label
        capital: "**$8 + 2 ×** (# **Silver** you already earned)"
        concept: Story sells.
        effect: "**Silver** award thresholds on your sales require **one fewer** matching resource token (if you track tokens);
          else **+$1** when you earn Silver."
      - id: celebrity_barrel_pick
        title: Celebrity barrel pick
        capital: "**$20** or **forfeit $10** cash instead of capital (choose at buy)"
        concept: Star power.
        effect: "**Once per game**, when you would earn **Gold**, you may instead take **$10** and **not** take the Gold marker
          (for a cash pivot)."
      - id: hygrometer_network
        title: Hygrometer network
        capital: "**$5 × R**"
        concept: Data from the rickhouse.
        effect: At the start of your turn, **look** at the top **2** Bourbon Cards; put them back in **any order**.
      - id: ttb_counsel
        title: TTB counsel
        capital: "**$6 × B − $4** (min **$8**)"
        concept: Paperwork shield.
        effect: "**Once per turn**, when a card or player would force you to **discard** an investment, you may **discard** this
          card instead."
  - id: risk_bankruptcy_flavor
    title: Risk / bankruptcy flavor
    cards:
      - id: distressed_asset_fund
        title: Distressed asset fund
        capital: "**$0** to hold; **pay half** printed capital of **stolen** card when you take it"
        concept: Buy cheap when others fail.
        effect: When another player **bankrupts**, you may **look** at their investment discard and **take one** sideways card
          by paying **half** its printed capital (round up).
      - id: insurance_rider
        title: Insurance rider
        capital: "**$4 × B + $6**"
        concept: Safety net on fees.
        effect: Once per game, if you cannot pay rickhouse fees, **discard this card** instead of triggering the full “no age /
          double fee” track (still tune to your bankruptcy rules).
      - id: receivership
        title: Receivership
        capital: "**Paid by rescuer:** **$5 × B** (not you)"
        concept: Temporary steward.
        effect: When **you** would go bankrupt, **another** player may pay **$5** to **take** this card and **one** of your
          barrelled bourbons (youngest)—you stay in the game with reduced assets (heavy rule; tune numbers).
      - id: charity_barrel
        title: Charity barrel
        capital: "**$2 × B + D** (D when played)"
        concept: Goodwill write-off.
        effect: "**Once per game**, when market demand would drop from your sale, you may **pay $2** to the bank to reduce
          demand by **0** for **everyone** for that sale only."
footer: >-
  When a card ships, move its **final text** into a card file or component list and keep **capital**, **once/turn**
  limits, and **mode** (Normal vs Bottled-in-Bond) consistent with **[GAME_RULES.md](GAME_RULES.md)**.


  **Legend:** **B** = Barons (players) · **R** = rickhouses where **you** have ≥1 barrel · **B_all** = **your**
  barrelled bourbons in play · **D** = **market demand** (usually **0–12**).
