# Playable investment catalog — edit this file, then run: npm run sync:investments
# (also runs from prebuild / predev). See GAME_RULES.md and docs/investment_cards.yaml for design notes.
version: 1
kind: investment_catalog_v1
intro:
  title: Investment catalog (playable)
  body: >-
    Canonical data for in-game investment cards. Each card has a stable id (used in saves),
    printed capital, optional modifiers (engine-backed kinds only — see sync script), and deckCopies
    (use 1 for unique cards).

cards:
  - id: inv_rickhouse
    name: Rickhouse expansion
    rarity: Standard
    capital: 6
    short: "+1 slot story — lighter fees"
    effect: >-
      Add capacity narrative; while active, once per round subtract $1 from your total rickhouse fees (minimum $0).
    deckCopies: 3
    modifiers:
      - kind: rickhouse_fee_discount
        amount: 1
        oncePerRound: true

  - id: inv_climate
    name: Climate-controlled tier
    rarity: Standard
    capital: 8
    short: Steady aging, steadier books
    effect: >-
      While active, the first paid action you take each round costs $1 less (after the free window ends).
    deckCopies: 3
    modifiers:
      - kind: action_cost_discount
        amount: 1
        scope: per_round_first_paid

  - id: inv_second_shift
    name: Second shift
    rarity: Rare
    capital: 10
    short: Next action runs cheaper
    effect: >-
      While active, your very next distillery action this round costs $1 less (stacks with free window as $0 stays $0).
    deckCopies: 2
    modifiers:
      - kind: action_cost_discount
        amount: 1
        scope: next_action

  - id: inv_corn_futures
    name: Corn futures
    rarity: Standard
    capital: 7
    short: Extra pull from the market
    effect: >-
      Once per round, your market buy draws one extra resource card on that action.
    deckCopies: 3
    modifiers:
      - kind: market_buy_bonus_cards
        extra: 1
        oncePerRound: true

  - id: inv_vertical
    name: Vertical integration
    rarity: Standard
    capital: 9
    short: Lean supply chain
    effect: >-
      While active, once per round subtract $1 from your rickhouse fees (minimum $0).
    deckCopies: 3
    modifiers:
      - kind: rickhouse_fee_discount
        amount: 1
        oncePerRound: true

  - id: inv_brand
    name: Brand ambassador
    rarity: Rare
    capital: 12
    short: Spotlight savings
    effect: >-
      While active, the first paid action you take each round costs $1 less.
    deckCopies: 1
    modifiers:
      - kind: action_cost_discount
        amount: 1
        scope: per_round_first_paid
