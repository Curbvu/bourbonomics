version: 1
kind: bourbon_cards_v1
intro:
  title: Bourbon cards
  body: >-
    Named **Bourbon Market Price Guide** cards for *Bourbonomics*. Each card is a specific product line. Grids use
    **2–4** age rows (top age **6** max) and **2–4** demand columns; payoffs are **steppy** (uneven jumps). **Standard**
    cards are common; **Rare** cards are fewer copies with higher ceilings.


    **Silver / Gold awards** appear only on **Rare** cards and a small set of **flagship Standard** lines—not every
    bottle chases a medal. Cards without award lines still sell using the Market Price Guide only.


    Lookup matches **GAME_RULES.md** (highest age row ≤ your bourbon age, highest demand column ≤ market demand).
    **Demand 0** uses **GAME_RULES**.
