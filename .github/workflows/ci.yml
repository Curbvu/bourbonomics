name: CI/CD Pipeline Bourbonomics

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      stage:
        description: "Optional SST stage override — prod, stg, or dev (leave blank to use branch mapping)"
        required: false
        default: ""
        type: string

# Avoid stacking deploys for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------------
  # CI: lint, test, and build. Runs on every push and PR.
  # Acts as the gate for the deploy job below.
  # ----------------------------------------------------------------------
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `sst install` generates `.sst/platform/config.d.ts`, which sst.config.ts
      # references via a triple-slash directive. Without this step, tsc would
      # fail on the missing types (and so would IDE / editor type-checks). It
      # runs offline — no AWS calls — so it's safe in the pre-deploy CI job.
      - name: Bootstrap SST platform types
        run: npx sst install

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build (Next.js)
        run: npm run build

  # ----------------------------------------------------------------------
  # Stage resolver. Same mapping as before:
  #   main → prod, stg → stg, anything else → dev.
  # workflow_dispatch input wins if set.
  # ----------------------------------------------------------------------
  stage:
    runs-on: ubuntu-latest
    outputs:
      stage: ${{ steps.map.outputs.stage }}
    steps:
      - id: map
        run: |
          set -e

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            STAGE="prod"
          elif [ "${{ github.ref }}" = "refs/heads/stg" ]; then
            STAGE="stg"
          else
            STAGE="dev"
          fi

          if [ -n "${{ github.event.inputs.stage }}" ]; then
            case "${{ github.event.inputs.stage }}" in
              prod|stg|dev)
                STAGE="${{ github.event.inputs.stage }}"
                ;;
              *)
                echo "Invalid manual stage '${{ github.event.inputs.stage }}'"; exit 1
                ;;
            esac
          fi
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------------------
  # Deploy. Only runs on:
  #   - push to main (prod), push to stg (stg), or
  #   - workflow_dispatch (operator-driven).
  # PRs and feature branches no longer auto-deploy to dev — that prevented
  # cost surprises and broken-PR deploys clobbering the shared dev URL.
  # To deploy a feature branch, use the "Run workflow" button with stage=dev.
  # ----------------------------------------------------------------------
  deploy:
    needs: [ci, stage]
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stg'))
    runs-on: ubuntu-latest
    env:
      HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
      CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
      DOMAIN: ${{ secrets.DOMAIN }}
      STAGE: ${{ needs.stage.outputs.stage }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Remove preinstalled Pulumi language plugin
        run: sudo rm -f /usr/local/bin/pulumi-language-nodejs

      - name: Deploy with SST
        run: npx sst deploy --stage "${{ env.STAGE }}"

      # Invalidate CloudFront so the UI updates immediately (edge cache can otherwise serve old HTML).
      - name: Invalidate CloudFront cache
        run: |
          case "${{ env.STAGE }}" in
            prod) SITE_DOMAIN="$DOMAIN" ;;
            stg)  SITE_DOMAIN="stg.$DOMAIN" ;;
            *)    SITE_DOMAIN="dev.$DOMAIN" ;;
          esac
          if [ -z "$DOMAIN" ]; then
            echo "DOMAIN secret empty, skipping invalidation"
            exit 0
          fi
          DIST_ID=$(aws cloudfront list-distributions --output json | jq -r --arg dom "$SITE_DOMAIN" '.DistributionList.Items[]? | select((.Aliases.Items // []) | index($dom)) | .Id' | head -1)
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "null" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
            echo "Invalidation created for distribution $DIST_ID ($SITE_DOMAIN)"
          else
            echo "No CloudFront distribution found for $SITE_DOMAIN, skipping invalidation"
          fi
