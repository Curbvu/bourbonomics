# ============================================================
# Bourbonomics — Themed Resource Card Catalog (Source of Truth)
# ============================================================
#
# Every premium resource and capital card in the market supply lives
# here. Plain commons (single-subtype, 1¢) are minted procedurally by
# `defaultMarketSupply()` and are NOT listed here — only the themed
# variants with names, costs, and effects.
#
# Effects fire at one of two discrete moments:
#   - on_commit  — when the card is spent into a barrel
#                  (production = MAKE_BOURBON; aging = AGE_BOURBON)
#   - on_sale    — when the barrel is sold (SELL_BOURBON)
#
# Capital cards may also fire on_spend when used in a market purchase.
# No turn-by-turn tracking, no upkeep, no triggers between commit/sale.
#
# Each card has:
#   defId         — engine identifier (snake_case, stable across tunings)
#   displayName   — on-card label
#   subtype       — cask | corn | rye | barley | wheat   (resources)
#   resourceCount — how many units it supplies (counts-as)
#   capitalValue  — only on capital cards: face value when paid
#   cost          — market price in card-units (1 capital ≥ printed value, others = 1)
#   rarity        — common | uncommon | rare      (drives market mix)
#   copies        — number of copies in the supply deck
#   effect        — { kind, when, ...params } | null
#   implemented   — true | design  (whether the engine resolves the effect)
#   flavor        — short tagline for the inspect modal
#
# When implemented: design, the card is minted into the supply with its
# stat line (resourceCount, capitalValue, cost) but the **effect itself
# does nothing yet**. The visual chrome + name still varies the market;
# wiring the effect is a follow-up.

# ────────────────────────────────────────────────────────────────────
# Distribution intent
#   commons   — majority of the deck (basic 1-of-subtype, no effect)
#   uncommons — meaningful minority (themed premiums with effects)
#   rares     — very rare (the 5 marked `rarity: rare` below; 1 copy each)
# ────────────────────────────────────────────────────────────────────

cards:
  # ─── Barley · Engine acceleration ────────────────────────────────
  - defId: two_row_barley
    displayName: Two-Row Barley
    flavor: A leaner stalk, cycles your hand.
    subtype: barley
    resourceCount: 1
    cost: 3
    rarity: uncommon
    copies: 2
